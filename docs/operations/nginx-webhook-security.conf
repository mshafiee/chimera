# Nginx Configuration for Chimera Webhook Security
#
# This configuration demonstrates how to sanitize query parameters to prevent
# bearer tokens from appearing in access logs when using WebSocket authentication.
#
# From operator/src/middleware/auth.rs:
# "SECURITY WARNING: Extracting token from query parameters for WebSocket authentication
#  - Tokens appear in server access logs
#  - Tokens appear in proxy logs (HAProxy, Nginx, load balancers)
#  - Tokens are stored in browser history
#  - Tokens may leak via Referer headers"
#
# Setup: Copy this file to /etc/nginx/sites-available/chimera-webhook-security.conf
#         Then: ln -s /etc/nginx/sites-available/chimera-webhook-security.conf /etc/nginx/sites-enabled/

server {
    listen 443 ssl http2;
    server_name chimera.example.com;

    ssl_certificate /etc/nginx/ssl/chimera.crt;
    ssl_certificate_key /etc/ssl/private/chimera.key;

    # SECURITY: Log sanitization - Redact bearer tokens from query parameters
    # This prevents WebSocket authentication tokens from appearing in logs
    # Format: /ws?token=abc123def456 → /ws?token=***REDACTED***

    # Option 1: Partial redaction (recommended - shows first 8 chars for debugging)
    # Log: /ws?token=abc123de***REDACTED***
    if ($args ~* "(^|&)token=") {
        set $args_redacted $args;
        set $args_redacted_debug $args;

        # Extract token value for debugging (first 8 chars only)
        set $token_debug "";
        if ($args ~* "(^|&)token=([^&]{1,8})") {
            set $token_debug=$1***;
        }

        # Replace token with redacted version (shows first 8 chars)
        rewrite ^(.*)\?token=[^&]*(.*)$ $1?token=$token_debug\&$2? permanent;

        # Log the redaction event
        access_log /var/log/nginx/webhook_security.log combined buffer=32k flush=5s;

        # Return 301 to the sanitized URL
        return 301;
    }

    # Option 2: Complete redaction (most secure - no token in logs)
    # Log: /ws?token=***REDACTED***
    # Uncomment the block below to enable instead of Option 1
    # if ($args ~* "(^|&)token=") {
    #     # Remove token parameter completely from query string
    #     rewrite ^(.*)\?token=[^&]*&?(.*)$ $1?$3 permanent;
    #
    #     access_log /var/log/nginx/webhook_security.log combined buffer=32k flush=5s;
    #     return 301;
    # }

    # Option 3: Remove query parameters entirely (most aggressive - loses debugging)
    # Log: /ws (no query string at all)
    # Uncomment the block below to enable instead of Options 1 or 2
    # if ($args ~* "token=") {
    #     # Remove entire query string from logs
    #     rewrite ^(.*)\?(.*)$ $1 permanent;
    #
    #     access_log /var/log/nginx/webhook_security.log combined buffer=32k flush=5s;
    #     return 301;
    # }

    # API endpoints with proper authentication headers
    location /api/ {
        # Log API requests with sanitized query parameters
        if ($args ~* "(^|&)token=") {
            # For API endpoints, prefer Authorization header over query params
            # Log warning if token is in query parameter
            access_log /var/log/nginx/api_with_token.log combined buffer=32k flush=5s;
        }

        # Proxy to Chimera operator
        proxy_pass http://localhost:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket upgrade headers (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # WebSocket endpoint with token sanitization
    location /ws {
        # WebSocket requires special handling
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy to Chimera WebSocket handler
        proxy_pass http://localhost:8080;
    }

    # Health check endpoint (public)
    location /health {
        proxy_pass http://localhost:8080;
        access_log off;
    }

    # Dashboard (static files)
    location / {
        root /var/www/chimera/web/dist;
        try_files $uri $uri/ /index.html =404;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Security monitoring endpoint
    location /security-events {
        proxy_pass http://localhost:8405;
        # Only allow from localhost
        allow 127.0.0.1;
        deny all;
    }
}

# Upstream configuration for backend operators
upstream chimera_operator {
    server localhost:8080;

    # Health check
    check interval=30s;
    rise=2;
    fall=3;
    timeout=5s;

    # Keep connections alive
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate limiting configuration (optional - can be enabled via third-party modules)
# Uncomment and configure if using nginx rate limiting module
#
# limit_req_zone $server_zone 1 zone=server_zone burst=10 nodelay;
# limit_req_zone $webhook_zone 10r/s zone=webhook_zone;
#
# location /api/v1/webhook {
#     limit_req zone=$webhook_zone burst=20 nodelay;
#     proxy_pass http://localhost:8080;
# }

# SSL configuration (ensure strong ciphers)
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:50m;
ssl_session_timeout 1d;

# Security headers
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;

# Client body size limits (match Chimera's 10MB limit)
client_max_body_size 10M;
client_body_buffer_size 128k;

# Client header size limits (match Chimera's 4KB limit)
large_client_header_buffers 8k;
