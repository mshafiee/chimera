# Prometheus configuration for Chimera
# Scrapes metrics from the Operator service

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'chimera'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'  # Alertmanager default port

# Load alert rules
rule_files:
  - 'alerts.yml'
  - 'security-alerts.yml'

# Scrape configurations
scrape_configs:
  # Chimera Operator metrics
  - job_name: 'chimera-operator'
    static_configs:
      - targets: ['operator:8080']  # Operator service name in Docker network
    metrics_path: '/metrics'
    scrape_interval: 5s  # High frequency for real-time monitoring
    
  # Chimera Scout metrics
  - job_name: 'chimera-scout'
    static_configs:
      - targets: ['scout:8081']  # Scout metrics port
    metrics_path: '/metrics'
    scrape_interval: 30s
    
  # Optional: Node exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']  # Node exporter service name (if available)
    scrape_interval: 15s

  # HAProxy metrics exporter
  - job_name: 'haproxy'
    static_configs:
      - targets: ['chimera-haproxy-exporter:9101']
    scrape_interval: 15s
    metrics_path: '/metrics'

  # Security log parser metrics (for security event processing)
  - job_name: 'security-log-parser'
    static_configs:
      - targets: ['chimera-security-log-parser:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # GeoIP lookup service metrics
  - job_name: 'geoip-lookup'
    static_configs:
      - targets: ['chimera-geoip-lookup:8001']
    metrics_path: '/metrics'
    scrape_interval: 60s

  # Attack detection service metrics
  - job_name: 'attack-detection'
    static_configs:
      - targets: ['chimera-attack-detection:8002']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL exporter metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['chimera-postgres-exporter:9187']
    metrics_path: '/metrics'
    scrape_interval: 15s
