# ===================================================================
# Output Configuration - Organize logs by day for evaluation
# ===================================================================

# Main evaluation output - organized by day
<match chimera.**>
  @type file
  @id evaluation_logs
  path /fluentd/log/evaluation/chimera
  <buffer>
    @type file
    path /fluentd/buffer/evaluation
    flush_interval 60s
    chunk_limit 20M
    flush_mode interval
    timekey 86400  # Daily rotation
    timekey_wait 10s
  </buffer>
  <format>
    {"timestamp":"${time}","service":"${tag_parts[0]}","level":"${record['level']}","message":"${record['message'}"}
  </format>
</match>

# Separate operator logs for detailed analysis
<match chimera.operator>
  @type copy
  @id operator_copy
  <buffer>
    @type file
    path /fluentd/buffer/operator
    flush_interval 30s
  </buffer>
</match>

<match chimera.operator>
  @type file
  @id operator_output
  path /fluentd/log/evaluation/operator
  <buffer>
    @type file
    path /fluentd/buffer/operator
    flush_interval 60s
    timekey 86400
    timekey_wait 10s
  </buffer>
  <format>
    {"timestamp":"${time}","service":"operator","level":"${record['level']}","message":"${record['message'}","trade_uuid":"${record['trade_uuid']}","wallet_address":"${record['wallet_address']}","token_address":"${record['token_address']}","strategy":"${record['strategy']}"}
  </format>
</match>

# Separate scout logs for wallet intelligence analysis
<match chimera.scout>
  @type copy
  @id scout_copy
  <buffer>
    @type file
    path /fluentd/buffer/scout
    flush_interval 30s
  </buffer>
</match>

<match chimera.scout>
  @type file
  @id scout_output
  path /fluentd/log/evaluation/scout
  <buffer>
    @type file
    path /fluentd/buffer/scout
    flush_interval 60s
    timekey 86400
    timekey_wait 10s
  </buffer>
  <format>
    {"timestamp":"${time}","service":"scout","level":"${record['level']}","message":"${record['message']}","wallet_analyzed":"${record['wallet_analyzed']}","wqs_score":"${record['wqs_score']}","discovery_count":"${record['discovery_count']}"}
  </format>
</match>

# System logs (web, database, backup, reconciliation)
<match chimera.(web|database|backup|reconciliation)>
  @type file
  @id system_output
  path /fluentd/log/evaluation/system
  <buffer>
    @type file
    path /fluentd/buffer/system
    flush_interval 60s
    timekey 86400
    timekey_wait 10s
  </buffer>
  <format>
    {"timestamp":"${time}","service":"${tag_parts[0]}","level":"${record['level']}","message":"${record['message']}"}
  </format>
</match>

# ===================================================================
# Error Log Aggregation - Collect all errors for investigation
# ===================================================================

<match chimera.**>
  @type grep
  @id error_filter
  regexp (ERROR|error|Error|CRITICAL|critical|WARN|warning|traceback)
  add_tag error_level true
</match>

<match error_level:true>
  @type copy
  @id error_copy
  <buffer>
    @type file
    path /fluentd/buffer/errors
    flush_interval 30s
  </buffer>
</match>

<match error_level:true>
  @type file
  @id error_output
  path /fluentd/log/evaluation/errors
  <buffer>
    @type file
    path /fluentd/buffer/errors
    flush_interval 30s
    timekey 86400
    timekey_wait 10s
  </buffer>
  <format>
    {"timestamp":"${time}","severity":"error","service":"${tag_parts[0]}","error_message":"${record['message']}","original_log":"${record}"}"}
  </format>
</match>

# ===================================================================
# Trade-Specific Log Aggregation - Extract key trading events
# ===================================================================

<match chimera.operator>
  @type grep
  @id trade_filter
  regexp (trade_uuid|wallet_address|token_address|strategy|signal_received|trade_executed|position_closed|circuit_breaker)
  add_tag trade_event true
</match>

<match trade_event:true>
  @type copy
  @id trade_copy
  <buffer>
    @type file
    path /fluentd/buffer/trades
    flush_interval 15s
  </buffer>
</match>

<match trade_event:true>
  @type file
  @id trade_output
  path /fluentd/log/evaluation/trades
  <buffer>
    @type file
    path /fluentd/buffer/trades
    flush_interval 30s
    timekey 3600  # Hourly rotation for trade analysis
    timekey_wait 10s
  </buffer>
</match>

# ===================================================================
# Performance Metrics Log Aggregation
# ===================================================================

<match chimera.operator>
  @type grep
  @id performance_filter
  regexp (latency|p95|p99|rpc_latency|queue_depth|memory_usage|cpu_usage|execution_time)
  add_tag performance_metric true
</match>

<match performance_metric:true>
  @type copy
  @id performance_copy
  <buffer>
    @type file
    path /fluentd/buffer/performance
    flush_interval 30s
  </buffer>
</match>

<match performance_metric:true>
  @type file
  @id performance_output
  path /fluentd/log/evaluation/performance
  <buffer>
    @type file
    path /fluentd/buffer/performance
    flush_interval 60s
    timekey 3600  # Hourly
    timekey_wait 10s
  </buffer>
</match>

# ===================================================================
# Security Event Log Aggregation
# ===================================================================

<match chimera.**>
  @type grep
  @id security_filter
  regexp (authentication|auth_failed|rate_limit|security|attack|unauthorized|forbidden|blocked|geoip|access_denied)
  add_tag security_event true
</match>

<match security_event:true>
  @type copy
  @id security_copy
  <buffer>
    @type file
    path /fluentd/buffer/security
    flush_interval 15s
  </buffer>
</match>

<match security_event:true>
  @type file
  @id security_output
  path /fluentd/log/evaluation/security
  <buffer>
    @type file
    path /fluentd/buffer/security
    flush_interval 30s
    timekey 3600  # Hourly
    timekey_wait 10s
  </buffer>
  <format>
    {"timestamp":"${time}","severity":"security","service":"${tag_parts[0]}","security_event":"${record['message']}","source_ip":"${record['source_ip']}","user_agent":"${record['user_agent']}"}
  </format>
</match>

# ===================================================================
# System Resource Monitoring
# ===================================================================

# Collect Docker container stats periodically
<source>
  @type exec
  @id docker_stats
  command docker stats --no-stream --format "table {{.Container}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}\t{{.NetIO}}\t{{.BlockIO}}"
  tag chimera.docker
  run_interval 60s
  <parse>
    @type docker_stats
  </parse>
</source>

<match chimera.docker>
  @type file
  @id docker_output
  path /fluentd/log/evaluation/docker-stats
  <buffer>
    @type file
    path /fluentd/buffer/docker
    flush_interval 60s
    timekey 3600  # Hourly
    timekey_wait 10s
  </buffer>
</match>

# ===================================================================
# Prometheus Metrics Scraping - Collect evaluation metrics
# ===================================================================

<source>
  @type http
  @id prometheus_operator
  url http://operator:8080/metrics
  tag prometheus.operator
  interval 60s
  <parse>
    @type prometheus
  </parse>
</source>

<source>
  @type http
  @id prometheus_scout
  url http://scout:8081/metrics
  tag prometheus.scout
  interval 60s
  <parse>
    @type prometheus
  </parse>
</source>

<match prometheus.**>
  @type file
  @id prometheus_output
  path /fluentd/log/evaluation/prometheus-metrics
  <buffer>
    @type file
    path /fluentd/buffer/prometheus
    flush_interval 60s
    timekey 3600  # Hourly
    timekey_wait 10s
  </buffer>
  <format>
    {"timestamp":"${time}","source":"${tag_parts[1]}","metric_name":"${record['name']}","metric_value":"${record['value']}","labels":"${record['labels']}"}
  </format>
</match>