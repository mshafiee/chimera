# Fluentd Configuration for Chimera 10-Day Evaluation
# Systematic log aggregation and organization for investigation-ready data

# ===================================================================
# Source Configurations - Collect logs from all Chimera services
# ===================================================================

# Operator Logs - JSON structured logs from Rust trading engine
<source>
  @type tail
  @id operator_logs
  path /var/log/chimera/operator.log
  pos_file /var/log/fluentd-operator.log.pos
  tag chimera.operator
  <parse>
    @type json
    time_key timestamp
  </parse>
  <buffer>
    @type file
    path /fluentd/buffer/operator
    flush_interval 30s
    chunk_limit 10M
  </buffer>
</source>

# Scout Logs - Python wallet intelligence layer logs
<source>
  @type tail
  @id scout_logs
  path /var/log/chimera/scout.log
  pos_file /var/log/fluentd-scout.log.pos
  tag chimera.scout
  <parse>
    @type regexp
    expression /^(?<time>[^ ]+?) (?<level>[^ ]+) (?<message>.*)$/
    time_key time
  </parse>
  <buffer>
    @type file
    path /fluentd/buffer/scout
    flush_interval 30s
    chunk_limit 10M
  </buffer>
</source>

