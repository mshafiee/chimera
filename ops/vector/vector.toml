# Vector Configuration for Chimera 10-Day Evaluation
# ARM64-compatible log aggregation - Simple working version

# ===================================================================
# Sources - Log Collection from Chimera Services
# ===================================================================

# Operator Logs - JSON structured logs from Rust trading engine
[sources.operator_logs]
type = "file"
include = ["/host/data/logs/operator.log"]
read_from = "beginning"
ignore_older_secs = 86400

# Scout Logs - Python wallet intelligence layer logs
[sources.scout_logs]
type = "file"
include = ["/host/data/logs/scout.log"]
read_from = "beginning"
ignore_older_secs = 86400

# Web Dashboard Logs
[sources.web_logs]
type = "file"
include = ["/host/data/logs/web.log"]
read_from = "beginning"
ignore_older_secs = 86400

# Database Logs
[sources.database_logs]
type = "file"
include = ["/host/data/logs/database.log"]
read_from = "beginning"
ignore_older_secs = 86400

# Backup Logs
[sources.backup_logs]
type = "file"
include = ["/host/data/logs/backup.log"]
read_from = "beginning"
ignore_older_secs = 86400

# Reconciliation Logs
[sources.reconcile_logs]
type = "file"
include = ["/host/data/logs/reconcile.log"]
read_from = "beginning"
ignore_older_secs = 86400

# ===================================================================
# Sinks - Output to Evaluation Storage
# ===================================================================

# Main evaluation output - all logs combined
[sinks.evaluation_logs]
type = "file"
inputs = ["operator_logs", "scout_logs", "web_logs", "database_logs", "backup_logs", "reconcile_logs"]
path = "/vector/log/evaluation/chimera-%Y-%m-%d.log"
encoding.codec = "json"
compression = "gzip"

# Separate operator logs for detailed analysis
[sinks.operator_output]
type = "file"
inputs = ["operator_logs"]
path = "/vector/log/evaluation/operator-%Y-%m-%d.log"
encoding.codec = "json"
compression = "gzip"

# Scout intelligence logs
[sinks.scout_output]
type = "file"
inputs = ["scout_logs"]
path = "/vector/log/evaluation/scout-%Y-%m-%d.log"
encoding.codec = "json"
compression = "gzip"

# System logs combined (web, database, backup, reconciliation)
[sinks.system_output]
type = "file"
inputs = ["web_logs", "database_logs", "backup_logs", "reconcile_logs"]
path = "/vector/log/evaluation/system-%Y-%m-%d.log"
encoding.codec = "json"
compression = "gzip"