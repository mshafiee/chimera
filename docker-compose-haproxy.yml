# HAProxy Integration for Chimera Trading System
# Adds reverse proxy with SSL/TLS termination and rate limiting

services:
  # HAProxy Reverse Proxy
  haproxy:
    image: chimera-haproxy:latest
    container_name: chimera-haproxy
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP (redirect to HTTPS)
      - "443:443"    # HTTPS
      - "8404:8404"  # HAProxy statistics dashboard
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./docker/haproxy/geoip.lua:/usr/local/etc/haproxy/geoip.lua:ro
      - ./ssl/certbot/letsencrypt:/etc/haproxy/certs:ro
      - ./docker/haproxy/errors:/usr/local/etc/haproxy/errors:ro
      - ./docker/haproxy/policies:/usr/local/etc/haproxy/policies:ro
    environment:
      # HAProxy stats
      - HAPROXY_STATS_PASSWORD=${HAPROXY_STATS_PASSWORD:-changeme_asap}
    networks:
      - chimera-network
    depends_on:
      - operator
      - web
      - prometheus
      - grafana
      - alertmanager
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "443"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - mainnet-paper
      - mainnet-prod

  # Certificate Manager (Certbot)
  certbot:
    image: certbot/certbot:latest
    container_name: chimera-certbot
    restart: unless-stopped
    volumes:
      - ./ssl/certbot/letsencrypt:/etc/letsencrypt
      - ./ssl/certbot/www:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: >
      /bin/sh -c '
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/html
                 --deploy-hook "cat /etc/letsencrypt/live/chimera-01.moez.tech/fullchain.pem /etc/letsencrypt/live/chimera-01.moez.tech/privkey.pem > /etc/letsencrypt/live/chimera-01.moez.tech/haproxy.pem && docker kill -s HUP chimera-haproxy || true";
          sleep 12h & wait $${!};
        done
      '
    networks:
      - chimera-network
    profiles:
      - mainnet-paper
      - mainnet-prod

  # HAProxy Prometheus Exporter - Security Metrics
  haproxy-exporter:
    image: prom/haproxy-exporter:latest
    container_name: chimera-haproxy-exporter
    restart: unless-stopped
    ports:
      - "9101:9101"
    command:
      - "--haproxy.scrape-uri=http://admin:${HAPROXY_STATS_PASSWORD:-changeme_asap}@stats:8404/stats"
      - "--web.listen-address=:9101"
    networks:
      - chimera-network
    depends_on:
      - haproxy
    profiles:
      - mainnet-paper
      - mainnet-prod

  # Security Log Parser Service
  security-log-parser:
    build:
      context: .
      dockerfile: tools/Dockerfile.security-parser
    container_name: chimera-security-log-parser
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - METRICS_PORT=8000
      - LOG_CHECK_INTERVAL=5
      - HAPROXY_LOG_PATH=/var/log/haproxy/security.log
    volumes:
      - /var/log/haproxy:/var/log/haproxy:ro
    networks:
      - chimera-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - mainnet-paper
      - mainnet-prod

  # GeoIP Lookup Service
  geoip-lookup:
    build:
      context: .
      dockerfile: tools/Dockerfile.geoip
      args:
        - GEOIP_DB_REFRESH=0
    container_name: chimera-geoip-lookup
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - METRICS_PORT=8001
      - GEOIP_COUNTRY_DB_PATH=/geoip/GeoLite2-Country.mmdb
      - GEOIP_ASN_DB_PATH=/geoip/GeoLite2-ASN.mmdb
      - CACHE_TTL=3600
      - POLICY_CACHE_TTL=300
    networks:
      - chimera-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - mainnet-paper
      - mainnet-prod

  # Attack Detection Service
  attack-detection:
    build:
      context: .
      dockerfile: tools/Dockerfile.attack-detection
    container_name: chimera-attack-detection
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - METRICS_PORT=8002
      - BRUTE_FORCE_THRESHOLD=100
      - DDOS_MULTIPLIER=10
      - WEBHOOK_FLOOD_THRESHOLD=50
    networks:
      - chimera-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - mainnet-paper
      - mainnet-prod

  # Policy Manager Service
  policy-manager:
    build:
      context: .
      dockerfile: tools/Dockerfile.policy-manager
    container_name: chimera-policy-manager
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - METRICS_PORT=8003
      - POLICY_DIR=/policies
      - HAPROXY_CONFIG=/usr/local/etc/haproxy/haproxy.cfg
      - HAPROXY_RELOAD_COMMAND=docker restart chimera-haproxy
    volumes:
      - ./docker/haproxy/policies:/policies:ro
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - chimera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - mainnet-paper
      - mainnet-prod

networks:
  chimera-network: