# Monitoring Routing Configuration for Chimera HAProxy Gateway
# This file contains detailed routing rules for monitoring tools

# Monitoring URL Structure
# /monitoring/prometheus/  → Prometheus (primary)
# /monitoring/grafana/     → Grafana (primary)
# /monitoring/alerts/      → AlertManager (primary)
# /metrics/                → Prometheus (legacy compatibility)
# /grafana/                → Grafana (legacy compatibility)
# /alerts/                 → AlertManager (legacy compatibility)

# URL Rewrite Rules for Legacy Compatibility
# When using legacy URLs, redirect to new monitoring URLs with deprecation notice

# Prometheus Routing Rules
frontend prometheus_routing
    # Capture legacy /metrics/ requests and redirect to /monitoring/prometheus/
    http-request set-path /monitoring/prometheus%[path] if { path -m beg /metrics }
    http-request set-header X-Deprecation-Warning "Legacy /metrics URL deprecated. Use /monitoring/prometheus/" if { path -m beg /metrics }

    # Query parameter preservation for Prometheus queries
    http-request set-query %[query] if { query -m found }

    # Add CORS headers for Prometheus API access
    http-response set-header Access-Control-Allow-Origin "*"
    http-response set-header Access-Control-Allow-Methods "GET, POST, OPTIONS"
    http-response set-header Access-Control-Allow-Headers "Authorization, Content-Type"

    # Forward authentication headers
    http-request set-header X-Auth-User %[http_auth(monitoring_credentials)] if { http_auth(monitoring_credentials) -m found }

# Grafana Routing Rules
frontend grafana_routing
    # Capture legacy /grafana/ requests and redirect to /monitoring/grafana/
    http-request set-path /monitoring/grafana%[path] if { path -m beg /grafana }
    http-request set-header X-Deprecation-Warning "Legacy /grafana URL deprecated. Use /monitoring/grafana/" if { path -m beg /grafana }

    # WebSocket support for Grafana live dashboards
    http-request set-header Upgrade %[req.Upgrade] if { req.Upgrade -m found }
    http-request set-header Connection %[req.Connection] if { req.Connection -m found }

    # Forward authentication headers for Grafana
    http-request set-header X-Auth-User %[http_auth(monitoring_credentials)] if { http_auth(monitoring_credentials) -m found }
    http-request set-header X-WEBAUTH-USER %[http_auth(monitoring_credentials)] if { http_auth(monitoring_credentials) -m found }

    # Add CORS headers for Grafana
    http-response set-header Access-Control-Allow-Origin "*"
    http-response set-header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    http-response set-header Access-Control-Allow-Headers "Authorization, Content-Type"

    # Preserve session cookies
    http-response set-header Set-Cookie "grafana_session=%[set-cookie(Connection)]; Path=/monitoring/grafana; HttpOnly; Secure; SameSite=Strict" if { set-cookie(Connection) -m found }

# AlertManager Routing Rules
frontend alertmanager_routing
    # Capture legacy /alerts/ requests and redirect to /monitoring/alerts/
    http-request set-path /monitoring/alerts%[path] if { path -m beg /alerts }
    http-request set-header X-Deprecation-Warning "Legacy /alerts URL deprecated. Use /monitoring/alerts/" if { path -m beg /alerts }

    # Add CORS headers for AlertManager API
    http-response set-header Access-Control-Allow-Origin "*"
    http-response set-header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    http-response set-header Access-Control-Allow-Headers "Authorization, Content-Type"

    # Admin-only access enforcement
    http-request deny if !{ http_auth(monitoring_credentials) -m found admin }

# Header Manipulation Rules
# Common headers for all monitoring tools

# Security headers
http-response set-header X-Frame-Options "DENY"
http-response set-header X-Content-Type-Options "nosniff"
http-response set-header X-XSS-Protection "1; mode=block"
http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains" if { ssl_fc }

# Cache control headers
http-response set-header Cache-Control "no-cache, no-store, must-revalidate" if { path -m beg /monitoring/prometheus }
http-response set-header Cache-Control "no-cache, no-store, must-revalidate" if { path -m beg /monitoring/alerts }
http-response set-header Cache-Control "private, max-age=300" if { path -m beg /monitoring/grafana }

# Content type headers
http-response set-header Content-Type "application/json" if { path -m beg /api/v1 }

# Forwarding headers for backend services
http-request set-header X-Forwarded-Proto https
http-request set-header X-Forwarded-Host %[req.HOST]
http-request set-header X-Forwarded-Port 443
http-request set-header X-Real-IP %[src]

# Request ID for tracing
http-request set-header X-Request-ID %[uuid]

# Path-based backend selection
# Use these rules in the main frontend

# Prometheus backend selection
use_backend prometheus_backend if { path_beg /monitoring/prometheus } || { path_beg /metrics }

# Grafana backend selection
use_backend grafana_backend if { path_beg /monitoring/grafana } || { path_beg /grafana }

# AlertManager backend selection
use_backend alertmanager_backend if { path_beg /monitoring/alerts } || { path_beg /alerts }

# Special API path routing
# Prometheus API paths
acl is_prometheus_api path_beg /monitoring/prometheus/api/v1
acl is_prometheus_query path_beg /monitoring/prometheus/api/v1/query
acl is_prometheus_range path_beg /monitoring/prometheus/api/v1/query_range

# Grafana API paths
acl is_grafana_api path_beg /monitoring/grafana/api
acl is_grafana_datasources path_beg /monitoring/grafana/api/datasources
acl is_grafana_dashboards path_beg /monitoring/grafana/api/dashboards

# AlertManager API paths
acl is_alertmanager_api path_beg /monitoring/alerts/api/v1
acl is_alertmanager_alerts path_beg /monitoring/alerts/api/v1/alerts
acl is_alertmanager_silences path_beg /monitoring/alerts/api/v1/silences

# Rate limiting for monitoring APIs (per backend)
# Prometheus query rate limiting
backend prometheus_backend
    stick-table type ip size 1m expire 10s store http_req_rate(10s)
    http-request track-sc0 src table_prometheus_queries
    http-request deny deny_status 429 if { sc0_http_req_rate(table_prometheus_queries) gt 50 }

# Grafana API rate limiting
backend grafana_backend
    stick-table type ip size 1m expire 10s store http_req_rate(10s)
    http-request track-sc0 src table_grafana_api
    http-request deny deny_status 429 if { sc0_http_req_rate(table_grafana_api) gt 100 }

# AlertManager API rate limiting
backend alertmanager_backend
    stick-table type ip size 1m expire 10s store http_req_rate(10s)
    http-request track-sc0 src table_alertmanager_api
    http-request deny deny_status 429 if { sc0_http_req_rate(table_alertmanager_api) gt 30 }

# WebSocket support configuration
# Grafana WebSocket connections
backend grafana_backend
    # WebSocket upgrade handling
    acl is_websocket_upgrade hdr(Connection) -i upgrade
    acl is_websocket_connection hdr(Upgrade) -i websocket

    # Tunnel mode for WebSocket
    option http-pretend-keepalive if is_websocket_upgrade is_websocket_connection
    timeout tunnel 1h if is_websocket_upgrade is_websocket_connection

# Health check endpoints for monitoring backends
# Prometheus health check
backend prometheus_backend
    option httpchk GET /-/api/v1/-/status
    http-check expect status 200

# Grafana health check
backend grafana_backend
    option httpchk GET /api/health
    http-check expect status 200

# AlertManager health check
backend alertmanager_backend
    option httpchk GET /-/healthy
    http-check expect status 200

# Monitoring path validation
# Ensure paths start with /monitoring/ for proper routing
acl is_valid_monitoring_path { path -m beg /monitoring/ }
http-request deny deny_status 400 if !is_valid_monitoring_path

# Legacy URL deprecation notices
# Add HTTP headers for legacy URLs
http-response set-header X-Legacy-URL "true" if { path -m beg /metrics }
http-response set-header X-Legacy-URL "true" if { path -m beg /grafana }
http-response set-header X-Legacy-URL "true" if { path -m beg /alerts }
http-response set-header X-Deprecation-Notice "This URL is deprecated. Use /monitoring/ prefix instead. Legacy URLs will be removed in v8.0." if { path -m beg /metrics } || { path -m beg /grafana } || { path -m beg /alerts }
