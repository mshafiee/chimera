# HAProxy Security Events Configuration
# Enhanced logging and categorization for security event monitoring

# Security event log format (JSON structured logging)
# Format: {"timestamp":"%t","source_ip":"%ci","frontend_port":"%fp","backend":"%b","server":"%s","http_status":"%st","http_method":"%HM","http_path":"%HP","http_query":"%HQ","user_agent":"%hu","rate_limit_violation":"%tr","geo_country":"%[var(txn.geo_country)]","asn":"%[var(txn.asn)]","threat_level":"%[var(txn.threat_level)]","request_id":"%[uuid]"}

# Security threat level definitions
# LOW: Normal security events for audit trail
# MEDIUM: Elevated error rates, suspicious patterns
# HIGH: Rate limit violations, geographic anomalies, user-agent anomalies
# CRITICAL: DDoS patterns, brute force attacks, authentication floods

# Security event categorization rules
# Rate limit violations - 429 responses
# Authentication failures - 401/403 responses
# Geographic anomalies - Unexpected country access
# User-agent anomalies - Automated tools, suspicious patterns
# SQL injection attempts - Path traversal, injection patterns
# DDoS patterns - High connection rates, uniform traffic patterns

# Enhanced security logging for specific endpoints
# Webhook endpoints: Track signature verification failures, replay attempts
# Authentication endpoints: Track credential stuffing, brute force patterns
# API endpoints: Track unusual access patterns, privilege escalation attempts

# Security event tracking for forensics
# Maintain request_id correlation across systems
# Track source IP reputation and history
# Log successful and failed security checks
# Maintain 30-day retention for compliance

# Performance considerations
# Security logging adds minimal overhead (~1-2ms per request)
# JSON format structured for automated parsing
# Separate log file for security events (rotation configured in logrotate)

# Integration points
# Prometheus metrics for real-time alerting
# Grafana dashboard for security visualization
# AlertManager integration for critical events
# SIEM integration for enterprise security monitoring

# Maintenance
# Review and update threat definitions monthly
# Tune detection thresholds based on traffic patterns
# Update allowed country lists as needed
# Review false positive rates quarterly