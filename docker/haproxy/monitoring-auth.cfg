# Monitoring Authentication Configuration for Chimera HAProxy Gateway
# This file contains authentication settings for monitoring tools

# Basic Authentication Users for Monitoring Tools
# IMPORTANT: Change these passwords in production!
# Format: username <password>
#
# Role-Based Access:
# - admin: Full access to Prometheus, Grafana, AlertManager
# - operator: Read-only access to metrics, view dashboards
# - viewer: Dashboard view only

userlist monitoring_credentials
  # Admin account - Full access to all monitoring tools
  admin insecure-change-me-admin-password

  # Operator account - Read metrics and view dashboards
  operator insecure-change-me-operator-password

  # Viewer account - Dashboard view only
  viewer insecure-change-me-viewer-password

# Authentication Realms for Different Tools
# Prometheus: Admin and Operator access required
# Grafana: All roles can access (role restrictions enforced by Grafana)
# AlertManager: Admin only access

# Session Management
# Authentication tokens are valid for the browser session
# No session timeout for monitoring access (configurable)

# Security Notes:
# 1. Passwords should be changed immediately after deployment
# 2. Use strong, randomly generated passwords (32+ characters recommended)
# 3. Rotate passwords quarterly
# 4. Use environment variables for production deployments
# 5. Consider integrating with admin wallet authentication for enhanced security

# Environment Variable Configuration (Recommended):
# - MONITORING_ADMIN_PASSWORD
# - MONITORING_OPERATOR_PASSWORD
# - MONITORING_VIEWER_PASSWORD

# HAProxy will use these credentials via:
# http-request auth realm <realm> if <condition>
# acl auth_valid http_auth(monitoring_credentials)
