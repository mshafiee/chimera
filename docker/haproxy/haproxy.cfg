# HAProxy Configuration for Chimera Trading System
# Version 2.8+

global
    # Security settings
    chroot /var/lib/haproxy
    user haproxy
    group haproxy
    daemon

    # SSL configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11

    # Performance tuning
    maxconn 50000
    nbproc 1
    nbthread 4

    # Logging
    log 127.0.0.1 local0 info
    log-tag haproxy

    # Statistics
    stats socket /var/lib/haproxy/stats level admin

    # GeoIP database for access control
    geoip-city-load /geoip/GeoLite2-City.mmdb

defaults
    # Global defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  http-server-close
    option  forwardfor except 127.0.0.0/8
    option  redispatch
    retries 3
    timeout connect 5000
    timeout client  50000
    timeout server  50000

    # Health checks
    option httpchk
    http-check expect status 200

    # Error pages
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

    # Enhanced security logging - Capture security headers
    capture request header X-Signature
    capture request header X-Timestamp
    capture request header User-Agent
    capture request header X-Real-IP
    capture response header X-Security-Event

    # Access Control - IP whitelist/blacklist
    acl is_whitelisted_ip src -f /usr/local/etc/haproxy/policies/whitelists/ips.lst
    acl is_blacklisted_ip src -f /usr/local/etc/haproxy/policies/blacklists/ips.lst

    # Access Control - Country filtering
    acl is_allowed_country src_geoip2_country -f /usr/local/etc/haproxy/policies/whitelists/countries.lst
    acl is_blocked_country src_geoip2_country -f /usr/local/etc/haproxy/policies/blacklists/countries.lst

    # Access Control - City filtering
    acl is_blocked_city src_geoip2_city_name -f /usr/local/etc/haproxy/policies/blacklists/cities.lst

    # Access Control - ASN filtering
    acl is_whitelisted_asn src_asn -f /usr/local/etc/haproxy/policies/whitelists/asns.lst
    acl is_blacklisted_asn src_asn -f /usr/local/etc/haproxy/policies/blacklists/asns.lst

    # Access Control - Default enforcement (blacklist mode)
    # Comment out the following line to enable whitelist mode
    # http-request deny if !is_whitelisted_ip

# Frontend - HTTPS (443)
frontend https_frontend
    bind *:443 ssl crt /etc/haproxy/certs/chimera.pem alpn h2,http/1.1
    mode http
    log global

    # ACL definitions - Application routing
    acl is_webhook path_beg /api/v1/webhook
    acl is_helius path_beg /api/v1/monitoring/helius-webhook
    acl is_health path /api/v1/health /health
    acl is_websocket path /ws
    acl is_api path_beg /api/
    acl is_dashboard path /
    acl is_admin path_beg /admin

    # ACL definitions - Monitoring routing
    acl is_monitoring path_beg /monitoring
    acl is_metrics path_beg /metrics
    acl is_grafana path_beg /grafana
    acl is_alerts path_beg /alerts

    # Access Control - IP blacklist enforcement
    http-request deny if is_blacklisted_ip
    http-request deny if is_blacklisted_asn

    # Access Control - Geographic restrictions
    http-request deny if is_blocked_country
    http-request deny if is_blocked_city

    # Access Control - Admin endpoint strict IP whitelist
    http-request deny if is_admin !is_whitelisted_ip

    # Access Control - Enhanced webhook security
    # Apply country restrictions to webhook endpoints
    http-request deny if is_webhook !is_allowed_country

    # Access Control - Monitoring endpoints security
    # Apply geographic restrictions to monitoring tools
    http-request deny if is_monitoring is_blocked_country
    http-request deny if is_monitoring is_blacklisted_ip

    # Authentication for monitoring endpoints (basic auth)
    http-request auth realm Chimera\ Monitoring\ Gateway if is_monitoring
    acl auth_valid http_auth(monitoring_credentials)
    http-request deny if is_monitoring !auth_valid

    # Routing rules with priority (application first, then monitoring)
    use_backend webhook_backend if is_webhook
    use_backend helius_webhook_backend if is_helius
    use_backend health_backend if is_health
    use_backend websocket_backend if is_websocket
    use_backend operator_backend if is_api
    use_backend web_backend if is_dashboard
    use_backend prometheus_backend if is_monitoring OR is_metrics
    use_backend grafana_backend if is_grafana
    use_backend alertmanager_backend if is_alerts

# Frontend - HTTP (80) - Redirect to HTTPS
frontend http_frontend
    bind *:80
    mode http
    redirect scheme https if !{ ssl_fc }

# Backend - Operator Service
backend operator_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health
    http-check expect status 200

    # Server configuration
    server operator operator:8080 check inter 2000 rise 2 fall 3 maxconn 1000

    # Preserve HMAC headers and add forwarding headers
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Port 443
    option http-buffer-request

    # Timeouts
    timeout connect 5s
    timeout server 30s

# Backend - Webhook (Trading Signals)
backend webhook_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health

    # Rate limiting stick table
    stick-table type ip size 1m expire 1m store http_req_rate(10s)
    http-request track-sc0 src table_inc_webhook

    # Enforce rate limit (100 req/s)
    http-request deny deny_status 429 if { sc0_http_req_rate(IncWebhook) gt 100 }

    # Server configuration
    server operator operator:8080 check inter 2000 rise 2 fall 3

    # Preserve critical HMAC headers
    http-request set-header X-Signature %{req.X-Signature} if { req.X-Signature -m found }
    http-request set-header X-Timestamp %{req.X-Timestamp} if { req.X-Timestamp -m found }
    http-request set-header X-Forwarded-Proto https

    # Timeouts (longer for webhook processing)
    timeout connect 5s
    timeout server 60s

# Backend - Helius Webhook
backend helius_webhook_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health

    # Rate limiting stick table
    stick-table type ip size 1m expire 1m store http_req_rate(10s)
    http-request track-sc0 src table_inc_helius

    # Enforce rate limit (45 req/s)
    http-request deny deny_status 429 if { sc0_http_req_rate(IncHelius) gt 45 }

    # Server configuration
    server operator operator:8080 check inter 2000 rise 2 fall 3

    # Preserve original headers
    http-request set-header X-Forwarded-Proto https

    # Timeouts
    timeout connect 5s
    timeout server 45s

# Backend - Health Check
backend health_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health

    server operator operator:8080 check inter 1000 rise 2 fall 3
    timeout connect 2s
    timeout server 5s

# Backend - WebSocket
backend websocket_backend
    mode http
    balance roundrobin

    # WebSocket upgrade handling
    option http-buffer-request
    option http-pretend-keepalive

    # Server configuration with tunnel mode
    server operator operator:8080 check inter 2000 rise 2 fall 3 maxconn 1000

    # WebSocket headers
    http-request set-header X-Forwarded-Proto https
    http-request set-header Upgrade %{req.Upgrade}
    http-request set-header Connection %{req.Connection}

    # Timeouts (long for WebSocket connections)
    timeout connect 5s
    timeout server 300s
    timeout tunnel 300s

# Backend - Web Dashboard
backend web_backend
    mode http
    balance roundrobin
    option httpchk GET /health

    server web web:80 check inter 2000 rise 2 fall 3

    # Timeouts
    timeout connect 5s
    timeout server 30s

# Backend - Prometheus Monitoring
backend prometheus_backend
    mode http
    balance roundrobin
    option httpchk GET /-/api/v1/-/status
    http-check expect status 200

    # Server configuration
    server prometheus chimera-prometheus:9090 check inter 5000 rise 2 fall 3

    # Preserve query parameters for queries
    option http-buffer-request

    # Timeouts for monitoring queries
    timeout connect 5s
    timeout server 30s
    maxconn 100

# Backend - Grafana Dashboard
backend grafana_backend
    mode http
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200

    # Server configuration
    server grafana chimera-grafana:3000 check inter 5000 rise 2 fall 3

    # Forward authentication headers
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Host %{req.HOST}

    # WebSocket support for live dashboards
    option http-pretend-keepalive
    timeout tunnel 30s

    # Timeouts
    timeout connect 5s
    timeout server 30s
    maxconn 50

# Backend - AlertManager
backend alertmanager_backend
    mode http
    balance roundrobin
    option httpchk GET /-/healthy
    http-check expect status 200

    # Server configuration
    server alertmanager chimera-alertmanager:9093 check inter 5000 rise 2 fall 3

    # Forward headers
    http-request set-header X-Forwarded-Proto https

    # Timeouts
    timeout connect 5s
    timeout server 30s
    maxconn 50

# Statistics interface - Enhanced for Prometheus Exporter
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats realm HAProxy\ Statistics
    stats auth admin:CHANGE_ME_PASSWORD
    stats show-legends
    stats show-node
    stats enable-stats-admin-auth

    # Expose stick-table statistics for security monitoring
    stats table stick-tables

# Prometheus metrics endpoint (for direct scraping)
listen prometheus_export
    bind *:8404
    mode http
    stats enable
    stats uri /metrics
    stats refresh 5s
    stats realm HAProxy\ Prometheus\ Metrics
    stats auth admin:CHANGE_ME_PASSWORD
    stats show-legends
    stats show-node
    stats enable-stats-admin-auth

# Security event logging configuration
frontend security_events
    bind *:8405
    mode http
    stats enable
    stats uri /security-events
    stats refresh 5s
    stats realm HAProxy\ Security\ Events
    stats auth admin:CHANGE_ME_PASSWORD
    stats show-legends
    stats show-node

    # Enhanced log format for security events
    log-format {"timestamp":"%t","source_ip":"%ci","frontend_port":"%fp","backend":"%b","server":"%s","http_status":"%st","http_method":"%HM","http_path":"%HP","http_query":"%HQ","user_agent":"%hu","rate_limit_violation":"%tr","geo_country":"%[var(txn.geo_country)]","asn":"%[var(txn.asn)]","threat_level":"%[var(txn.threat_level)]","request_id":"%[uuid]"}
    option httplog

    # Security event categorization
    http-request set-var(txn.threat_level) str(LOW) if !{ src -m geoip2_country_code }

    # Rate limit violation tracking
    http-request set-var(txn.threat_level) str(HIGH) if { sc0_http_req_rate(IncWebhook) gt 100 }
    http-request set-var(txn.threat_level) str(HIGH) if { sc0_http_req_rate(IncHelius) gt 45 }
    http-request set-var(txn.threat_level) str(CRITICAL) if { sc0_http_req_rate(IncWebhook) gt 200 }

    # Log all security events
    log /dev/log local info

# Monitoring Authentication Configuration
# Basic authentication for monitoring tools
userlist monitoring_credentials
  admin insecure-change-me-admin-password
  viewer insecure-change-me-viewer-password