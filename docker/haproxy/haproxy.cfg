# HAProxy Configuration for Chimera Trading System
# Version 2.8+ (Community Edition compatible)

global
    # Security settings
    user haproxy
    group haproxy

    # SSL configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11

    # Performance tuning
    maxconn 50000
    nbthread 4

    # Logging
    log 127.0.0.1 local0 info
    log-tag haproxy

    # Statistics
    stats socket /tmp/haproxy.stats level admin

    # Lua GeoIP script
    lua-load /usr/local/etc/haproxy/geoip.lua

# Userlist for basic auth (monitoring endpoints + stats dashboard)
userlist chimera_admins
    user admin insecure-password stats123

defaults
    # Global defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  http-server-close
    option  forwardfor except 127.0.0.0/8
    option  redispatch
    retries 3
    timeout connect 5000
    timeout client  50000
    timeout server  50000

    # Health checks
    option httpchk
    http-check expect status 200

    # Error pages
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

# Frontend - HTTPS (443)
frontend https_frontend
    bind *:443 ssl crt /etc/haproxy/certs/chimera-01.moez.tech.pem alpn h2,http/1.1
    mode http
    log global

    # Enhanced security logging - Capture security headers
    capture request header X-Signature len 64
    capture request header X-Timestamp len 64
    capture request header User-Agent len 128
    capture request header X-Real-IP len 64
    capture response header X-Security-Event len 64

    # Access Control - IP whitelist/blacklist
    acl is_whitelisted_ip src -f /usr/local/etc/haproxy/policies/whitelists/ips.lst
    acl is_blacklisted_ip src -f /usr/local/etc/haproxy/policies/blacklists/ips.lst

    # Access Control - GeoIP (using Lua-based transaction variables)
    http-request lua.geoip_lookup
    acl is_allowed_country var(txn.geo_country),map(/usr/local/etc/haproxy/policies/whitelists/countries.lst)
    acl is_blocked_country var(txn.geo_country),map(/usr/local/etc/haproxy/policies/blacklists/countries.lst)
    acl is_whitelisted_asn var(txn.geo_asn),map(/usr/local/etc/haproxy/policies/whitelists/asns.lst)
    acl is_blacklisted_asn var(txn.geo_asn),map(/usr/local/etc/haproxy/policies/blacklists/asns.lst)

    # ACL definitions - Application routing
    acl is_webhook path_beg /api/v1/webhook
    acl is_helius path_beg /api/v1/monitoring/helius-webhook
    acl is_health path /api/v1/health /health
    acl is_websocket path_beg /ws
    acl is_metrics path_beg /metrics
    acl is_api path_beg /api/
    acl is_dashboard path /
    acl is_static path_beg /assets/
    acl is_favicon path /chimera.svg /favicon.ico
    acl is_prometheus path_beg /prometheus
    acl is_grafana path_beg /grafana
    acl is_alerts path_beg /alerts

    # Access Control - IP blacklist enforcement
    http-request deny if is_blacklisted_ip
    http-request deny if is_blacklisted_asn

    # Access Control - Geographic restrictions
    http-request deny if is_blocked_country

    # Access Control - Enhanced webhook security
    # Apply country restrictions to webhook endpoints
    http-request deny if is_webhook !is_allowed_country

    # Access Control - Monitoring endpoints security
    # Apply geographic restrictions to monitoring tools
    http-request deny if is_prometheus is_blocked_country
    http-request deny if is_prometheus is_blacklisted_ip

    # Authentication for monitoring endpoints (basic auth)
    acl is_monitoring path_beg /grafana /prometheus /alerts
    acl is_authenticated http_auth(chimera_admins)
    http-request auth realm Chimera\ Monitoring if is_monitoring !is_authenticated

    # Routing rules with priority (application first, then monitoring)
    use_backend webhook_backend if is_webhook
    use_backend helius_webhook_backend if is_helius
    use_backend health_backend if is_health
    use_backend websocket_backend if is_websocket
    use_backend operator_metrics_backend if is_metrics
    use_backend operator_backend if is_api
    use_backend web_backend if is_dashboard
    use_backend web_backend if is_static
    use_backend web_backend if is_favicon
    use_backend prometheus_backend if is_prometheus
    use_backend grafana_backend if is_grafana
    use_backend alertmanager_backend if is_alerts

    # Default backend - serves the SPA for client-side routing (e.g. /dashboard, /wallets)
    default_backend web_backend

# Frontend - HTTP (80) - ACME Challenge + HTTPS Redirect
frontend http_frontend
    bind *:80
    mode http

    # Let's Encrypt ACME challenge
    acl is_acme_challenge path_beg /.well-known/acme-challenge/
    use_backend acme_backend if is_acme_challenge

    # Redirect everything else to HTTPS
    redirect scheme https code 301 if !is_acme_challenge

# Backend - ACME Challenge
backend acme_backend
    mode http
    server certbot certbot:80

# Backend - Operator Service
backend operator_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health
    http-check expect status 200

    # Server configuration
    server operator operator:8080 check inter 2000 rise 2 fall 3 maxconn 1000

    # Preserve HMAC headers and add forwarding headers
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Port 443
    option http-buffer-request

    # Timeouts
    timeout connect 5s
    timeout server 30s

# Backend - Webhook (Trading Signals)
backend webhook_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health

    # Rate limiting stick table
    stick-table type ip size 1m expire 1m store http_req_rate(10s)
    http-request track-sc0 src

    # Enforce rate limit (100 req/10s)
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    # Server configuration
    server operator operator:8080 check inter 2000 rise 2 fall 3

    # Preserve critical HMAC headers
    http-request set-header X-Signature %[req.hdr(X-Signature)] if { req.hdr(X-Signature) -m found }
    http-request set-header X-Timestamp %[req.hdr(X-Timestamp)] if { req.hdr(X-Timestamp) -m found }
    http-request set-header X-Forwarded-Proto https

    # Timeouts (longer for webhook processing)
    timeout connect 5s
    timeout server 60s

# Backend - Helius Webhook
backend helius_webhook_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health

    # Rate limiting stick table
    stick-table type ip size 1m expire 1m store http_req_rate(10s)
    http-request track-sc0 src

    # Enforce rate limit (45 req/10s)
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 45 }

    # Server configuration
    server operator operator:8080 check inter 2000 rise 2 fall 3

    # Preserve original headers
    http-request set-header X-Forwarded-Proto https

    # Timeouts
    timeout connect 5s
    timeout server 45s

# Backend - Health Check
backend health_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health

    server operator operator:8080 check inter 1000 rise 2 fall 3
    timeout connect 2s
    timeout server 5s

# Backend - WebSocket
backend websocket_backend
    mode http
    balance roundrobin

    # WebSocket upgrade handling
    option http-buffer-request
    option http-pretend-keepalive

    # Server configuration with tunnel mode
    server operator operator:8080 check inter 2000 rise 2 fall 3 maxconn 1000

    # WebSocket headers
    http-request set-header X-Forwarded-Proto https
    http-request set-header Upgrade %[req.hdr(Upgrade)]
    http-request set-header Connection %[req.hdr(Connection)]

    # Timeouts (long for WebSocket connections)
    timeout connect 5s
    timeout server 300s
    timeout tunnel 300s

# Backend - Web Dashboard
backend web_backend
    mode http
    balance roundrobin
    option httpchk GET /health

    server web web:80 check inter 2000 rise 2 fall 3

    # Timeouts
    timeout connect 5s
    timeout server 30s

# Backend - Operator Metrics (for Prometheus scraping)
backend operator_metrics_backend
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health

    server operator operator:8080 check inter 2000 rise 2 fall 3

    # Timeouts
    timeout connect 5s
    timeout server 30s

# Backend - Prometheus Monitoring
backend prometheus_backend
    mode http
    balance roundrobin
    option httpchk GET /-/healthy
    http-check expect status 200

    # Strip /prometheus prefix
    http-request set-path %[path,regsub(^/prometheus/,/,)]

    # Server configuration
    server prometheus chimera-prometheus:9090 check inter 5000 rise 2 fall 3

    # Preserve query parameters for queries
    option http-buffer-request

    # Timeouts for monitoring queries
    timeout connect 5s
    timeout server 30s
    maxconn 100

# Backend - Grafana Dashboard
backend grafana_backend
    mode http
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200

    # Strip /grafana prefix
    http-request set-path %[path,regsub(^/grafana/,/,)]

    # Server configuration
    server grafana chimera-grafana:3000 check inter 5000 rise 2 fall 3

    # Forward authentication headers
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Host %[req.hdr(Host)]

    # WebSocket support for live dashboards
    option http-pretend-keepalive
    timeout tunnel 30s

    # Timeouts
    timeout connect 5s
    timeout server 30s
    maxconn 50

# Backend - AlertManager
backend alertmanager_backend
    mode http
    balance roundrobin
    option httpchk GET /-/healthy
    http-check expect status 200

    # Redirect /alerts to /alerts/ so path stripping works
    http-request redirect scheme https drop-query append-slash if { path /alerts }
    # Strip /alerts prefix
    http-request set-path %[path,regsub(^/alerts/,/,)]

    # Server configuration
    server alertmanager chimera-alertmanager:9093 check inter 5000 rise 2 fall 3

    # Forward headers
    http-request set-header X-Forwarded-Proto https

    # Timeouts
    timeout connect 5s
    timeout server 30s
    maxconn 50

# Statistics interface
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats realm HAProxy\ Statistics
    stats auth admin:stats123
    stats show-legends
    stats show-node

# Prometheus metrics endpoint (for direct scraping)
listen prometheus_export
    bind *:8405
    mode http
    stats enable
    stats uri /metrics
    stats refresh 5s
    stats realm HAProxy\ Prometheus\ Metrics
    stats auth admin:stats123
    stats show-legends
    stats show-node
