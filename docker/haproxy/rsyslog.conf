# rsyslog config for HAProxy
# HAProxy logs to 127.0.0.1:514 (UDP) per `log 127.0.0.1 local0 info`.
$ModLoad imuxsock
$ModLoad imudp
$UDPServerAddress 127.0.0.1
$UDPServerRun 514

$template HAProxyJSONFormat,"%msg%\n"
$template HAProxyLogFile,"/var/log/haproxy/haproxy.log"

# Route HAProxy local0.* to the shared-volume log file (raw JSON only).
local0.* ?HAProxyLogFile;HAProxyJSONFormat
& stop