services:
  # PostgreSQL - Production Database (mainnet-paper and mainnet-prod profiles)
  postgres:
    image: postgres:15-alpine
    container_name: chimera-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      # Database credentials
      - POSTGRES_USER=${POSTGRES_USER:-chimera}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_asap}
      - POSTGRES_DB=${POSTGRES_DB:-chimera}
      # Performance tuning
      - POSTGRES_INITDB_ARGS=-E UTF8 --locale=C
      - POSTGRES_SHARED_BUFFERS=256MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=1GB
      - POSTGRES_MAINTENANCE_WORK_MEM=64MB
      - POSTGRES_WORK_MEM=16MB
      - POSTGRES_MAX_CONNECTIONS=100
      # WAL configuration for backup/recovery
      - POSTGRES_WAL_LEVEL=replica
      - POSTGRES_MAX_WAL_SENDERS=3
      - POSTGRES_WAL_KEEP_SIZE=256MB
    volumes:
       # Data persistence
       - postgres-data:/var/lib/postgresql/data
       # Initialization scripts (using generated schema)
       - ./operator/migrations_postgres/0001_full_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
       - ./scout/schema_scout_tables.sql:/docker-entrypoint-initdb.d/02-scout-tables.sql:ro
       # Custom pg_hba.conf (trust auth within Docker network)
       - ./docker/postgres/pg_hba.conf:/var/lib/postgresql/pg_hba.conf:ro
       # Backup scripts
       - ./ops/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=3"
      - "-c"
      - "wal_keep_size=256MB"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "hba_file=/var/lib/postgresql/pg_hba.conf"
      - "-c"
      - "log_destination=stderr"
      - "-c"
      - "log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chimera} -d ${POSTGRES_DB:-chimera}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chimera-network
    profiles:
      - mainnet-paper
      - mainnet-prod
      - evaluation

  # Redis - Unified cache for security services and application caching
  redis:
    image: redis:7-alpine
    container_name: chimera-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - "redis-server"
      - "--appendonly yes"                    # AOF persistence
      - "--appendfsync everysec"              # Flush every second
      - "--maxmemory 512mb"                   # Memory limit
      - "--maxmemory-policy allkeys-lru"      # Eviction policy
      - "--save 900 1"                         # RDB snapshot: 1 change in 900s
      - "--save 300 10"                        # RDB snapshot: 10 changes in 300s
      - "--save 60 10000"                      # RDB snapshot: 10k changes in 60s
      - "--dir /data"                          # Data directory
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - chimera-network
    profiles:
      - mainnet-paper
      - mainnet-prod
      - evaluation

  # Chimera Operator - Core trading engine
  operator:
    build:
      context: ./operator
      dockerfile: Dockerfile
    container_name: chimera-operator
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
       - CHIMERA_SERVER__HOST=0.0.0.0
       - CHIMERA_SERVER__PORT=8080
       # Database backend selection (PostgreSQL-only)
       - CHIMERA_DB_MODE=${CHIMERA_DB_MODE:-postgres}
       - DATABASE_URL=${DATABASE_URL:-postgresql://chimera:changeme_asap@postgres:5432/chimera}
       # Redis configuration
       - REDIS_ENABLED=${REDIS_ENABLED:-true}
       - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
       # Jupiter API (required for production)
       - CHIMERA_JUPITER__API_KEY=${JUPITER_API_KEY:-jup_7e095c7e729dadb3070b15417faaeed98464afde972184fdd93e0b24247fc857}
       # Paper trading mode
       - CHIMERA_TRADE_MODE=paper
    env_file:
      - .env
    depends_on:
      - prometheus
      - postgres
      - redis
    networks:
      - chimera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - devnet
      - mainnet-paper
      - mainnet-prod
      - evaluation

  # Chimera Scout - Wallet intelligence layer
  scout:
    build:
      context: .
      dockerfile: scout/Dockerfile
    container_name: chimera-scout
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - scout-data:/app/scout-data
      - ./scout:/app
    environment:
      - PYTHONUNBUFFERED=1
      # Fix Auto-Merge: Use operator container name
      - CHIMERA_API_URL=http://chimera-operator:8080
      - CHIMERA_OPERATOR_CONTAINER=chimera-operator
      # Helius API Key for wallet discovery
      - HELIUS_API_KEY=${HELIUS_API_KEY}
      # Birdeye API Key for historical liquidity (optional; set SCOUT_LIQUIDITY_MODE=real when provided)
      - BIRDEYE_API_KEY=${BIRDEYE_API_KEY:-}
      # Improved Discovery Configuration
      - SCOUT_MIN_TRADE_COUNT=1
      - SCOUT_MAX_WALLETS=50
      - SCOUT_DISCOVERY_HOURS=24
      - SCOUT_LIQUIDITY_MODE=${SCOUT_LIQUIDITY_MODE:-simulated}
      # Performance Optimization
      - SCOUT_WALLET_TX_LIMIT=50                                 # Reduced to 50 for faster testing
      - SCOUT_WALLET_TX_MAX_PAGES=10                             # Reduced from 20 (50% reduction)
      - SCOUT_DISCOVERY_MIN_SOL=0.05                             # Increased from 0.01 (filter spam)
      # WQS Thresholds (relaxed for paper trading)
      - SCOUT_MIN_WQS_ACTIVE=25.0
      - SCOUT_MIN_WQS_CANDIDATE=10.0
      # Clean token list (removed invalid addresses: GCS89xYV, Ac7m5c4t, G0AT7B4R, M00DENG)
      - SCOUT_ACTIVE_TOKENS=DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263,EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm,7GCihgDB8fe6KNjn2MYtkzZcRjQy3t9GHdC8uHYmW2hr,Grass7B4RdKfBCjTKgSqnXkqjwiG6DuGc62rSdZ9mtm,So11111111111111111111111111111111111111112
      # API Keys for validation (Loaded from env_file)
      # Database configuration
      - CHIMERA_DB_MODE=${CHIMERA_DB_MODE:-postgres}
      - DATABASE_URL=${DATABASE_URL:-postgresql://chimera:changeme_asap@postgres:5432/chimera}
      # Redis configuration
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Scout-specific Redis caching
      - SCOUT_CACHE_ENABLED=true
      - SCOUT_CACHE_TTL=3600
      - SCOUT_LIQUIDITY_CACHE_TTL=60
      # Paper trading mode
      - CHIMERA_TRADE_MODE=${CHIMERA_TRADE_MODE:-paper}
    env_file:
      - .env
    depends_on:
      - operator
      - postgres
      - redis
    networks:
        - chimera-network
    # Run scout on a schedule (daily at 2 AM UTC)
    command: >
       sh -c "
         echo '[Scout] Starting wallet analysis...';
         python main.py || true;
         echo '[Scout] Analysis complete, sleeping for 24 hours...';
          sleep 86400;
        "
    profiles:
       - devnet
       - mainnet-paper
       - mainnet-prod
       - evaluation

  # Web Dashboard
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: chimera-web
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_SOLANA_RPC=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
    depends_on:
      - operator
    networks:
      - chimera-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    profiles:
      - devnet
      - mainnet-paper
      - mainnet-prod

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: chimera-prometheus
    restart: unless-stopped
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.external-url=https://chimera-01.moez.tech/prometheus'
      - '--web.route-prefix=/'
    networks:
      - chimera-network
    profiles:
      - devnet
      - mainnet-paper
      - mainnet-prod
      - evaluation

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: chimera-grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme_asap}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://chimera-01.moez.tech/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus
    networks:
      - chimera-network
    profiles:
      - devnet
      - mainnet-paper
      - mainnet-prod
      - evaluation

  # Alertmanager - Alert routing
  alertmanager:
    image: prom/alertmanager:latest
    container_name: chimera-alertmanager
    restart: unless-stopped
    volumes:
      - ./ops/alertmanager/config.yml:/etc/alertmanager/config.yml.template:ro
      - ./ops/alertmanager/entrypoint.sh:/entrypoint.sh:ro
      - alertmanager-data:/alertmanager
    env_file:
      - docker/env.${COMPOSE_PROFILE:-devnet}
      - docker/env.${COMPOSE_PROFILE:-devnet}.local
    command:
      - '--web.external-url=https://chimera-01.moez.tech/alerts'
      - '--web.route-prefix=/'
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - chimera-network
    profiles:
      - devnet
      - mainnet-paper
      - mainnet-prod

  # PostgreSQL Exporter - Metrics for Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: chimera-postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-chimera}:${POSTGRES_PASSWORD:-changeme_asap}@postgres:5432/${POSTGRES_DB:-chimera}?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - chimera-network
    depends_on:
      - postgres
    profiles:
      - mainnet-paper
      - mainnet-prod

volumes:
  alertmanager-data:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  scout-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  chimera-network:
    driver: bridge
