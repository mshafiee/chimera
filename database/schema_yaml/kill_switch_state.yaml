  - {name: changed_at, type: timestamp, not_null: true, default: "CURRENT_TIMESTAMP"}
  - {name: changed_by, type: text, not_null: true, default: "'SYSTEM'"}
  - {name: reason, type: text}
indexes: []
foreign_keys: []
triggers: []