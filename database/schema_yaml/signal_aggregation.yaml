table: signal_aggregation
description: "Multi-wallet signal tracking"
columns:
  - {name: id, type: bigserial, pk: true}
  - {name: token_address, type: text, not_null: true}
  - {name: wallet_address, type: text, not_null: true}
  - {name: direction, type: text, not_null: true, check: "direction IN ('BUY', 'SELL')"}
  - {name: amount_sol, type: decimal(30,18), not_null: true}
  - {name: signature, type: text}
  - {name: is_consensus, type: bool, default: false}
  - {name: consensus_wallet_count, type: int}
  - {name: created_at, type: timestamp, default: "CURRENT_TIMESTAMP"}
indexes:
  - {name: idx_signal_aggregation_unique_with_sig, columns: [token_address, wallet_address, signature], unique: true, where: "signature IS NOT NULL"}
  - {name: idx_signal_aggregation_unique_no_sig, columns: [token_address, wallet_address, direction, created_at], unique: true, where: "signature IS NULL"}
  - {name: idx_signal_aggregation_token_time, columns: [token_address, created_at], desc: true}
  - {name: idx_signal_aggregation_consensus, columns: [is_consensus], where: "is_consensus = true"}
foreign_keys:
  - {column: wallet_address, ref_table: wallets, ref_col: address, on_delete: CASCADE}
triggers: []